# Double-click a commit SHA to show that commit's diff in the diff pane (bottom-right, @dpane); press
# q there to return to the live working diff. Fires in the commit pane (@cpane) AND the claude/chat
# pane (@claudepane) — so SHAs the agent prints in chat are double-clickable too (Claude's TUI doesn't
# grab the mouse, so tmux gets the double-click). The double-clicked word is piped to the helper, which
# extracts the SHA; non-SHA double-clicks just copy the word as usual. Every other pane keeps tmux's
# default select-word/copy behaviour.
bind -n DoubleClick1Pane if-shell -F '#{||:#{@cpane},#{@claudepane}}' {
  copy-mode -H
  send-keys -X select-word
  send-keys -X copy-pipe-and-cancel "__DEV__/.wtd/hooks/commit-diff-show.sh"
} {
  select-pane -t =
  if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel }
}
